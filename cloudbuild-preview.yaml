# Cloud Build configuration for PR preview deployments to Cloud Run.
#
# Triggered by Terraform (google_cloudbuild_trigger.preview) on pull_request events.
# Deploys to lgportfolio-preview with public ingress (direct Run URL, no ALB cost).
#
# Substitution variables (set in Cloud Build trigger):
#   _REGION          — e.g. us-east1
#   _SERVICE_NAME    — e.g. lgportfolio-preview
#   _AR_REPO         — Artifact Registry repo, e.g. portfolio
#   _PR_NUMBER       — PR number (auto from trigger; used for image tag)

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_GA_MEASUREMENT_ID="
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/app:pr-${_PR_NUMBER}-${SHORT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/app:pr-${_PR_NUMBER}-${SHORT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/app:pr-${_PR_NUMBER}-${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--ingress"
      - "all"
      - "--service-account"
      - "portfolio-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "1"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "30"
      - "--cpu-throttling"
      - "--port"
      - "8080"
      - "--set-env-vars"
      - "NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},DEPLOY_ENV=preview"
      - "--set-secrets"
      - "INFERENCIA_API_KEY=inferencia-api-key:latest,INFERENCIA_BASE_URL=inferencia-base-url:latest,FIREBASE_SERVICE_ACCOUNT_JSON=firebase-service-account:latest,ADMIN_SECRET=admin-secret:latest"

substitutions:
  _REGION: us-east1
  _SERVICE_NAME: lgportfolio-preview
  _AR_REPO: portfolio
  _PR_NUMBER: "0"

options:
  logging: CLOUD_LOGGING_ONLY
