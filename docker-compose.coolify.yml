# Coolify / homelab deploy for gimenez.dev (Pi 5 @ 192.168.0.207)
# Same Docker network as inferencia + prometheus — LAN metrics and LLM calls.
#
# Usage:
#   cp .env.coolify.example .env.coolify   # fill secrets
#   docker compose -f docker-compose.coolify.yml up -d --build
#
# Traefik route: /data/coolify/proxy/dynamic/gimenez.yaml (see scripts/deploy-coolify.sh)

name: lgportfolio

networks:
  coolify:
    external: true

services:
  lgportfolio:
    container_name: lgportfolio
    build:
      context: .
      dockerfile: Dockerfile
    image: lgportfolio:latest
    restart: unless-stopped
    networks:
      - coolify
    env_file:
      - .env.coolify
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      COOLIFY: "1"
      # Pinned defaults — override only by editing this file + redeploy (not Coolify UI drift)
      INFERENCIA_BASE_URL: "http://inferencia:8080/v1"
      INFERENCIA_CHAT_MODEL: "gemma4:12b"
      PROMETHEUS_URL: "http://prometheus-prometheus-1:9090"
      NEXT_PUBLIC_SITE_URL: "https://gimenez.dev"
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    labels:
      - coolify.managed=true
      - traefik.enable=false
