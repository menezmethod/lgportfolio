# CI: lint, build, unit tests, e2e (Cypress against production).
# Required to pass before merging to main. On push to main, deploys to Coolify (Pi) after all checks pass.
# Terraform (terraform/) is kept for optional GCP rollback only — not run in CI.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

  cypress:
    runs-on: ubuntu-latest
    needs: lint-build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Cypress against production
        uses: cypress-io/github-action@v6
        with:
          # Tests run against gimenez.dev (baseUrl in cypress.config.ts)
          # No start/wait-on needed — we test live production
          browser: chrome

  deploy:
    runs-on: ubuntu-latest
    needs: cypress
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "$COOLIFY_API_TOKEN" ] || [ -z "$COOLIFY_APP_UUID" ] || [ -z "$COOLIFY_URL" ]; then
            echo "::error::Coolify deploy blocked — set COOLIFY_URL, COOLIFY_API_TOKEN, and COOLIFY_APP_UUID in repo secrets."
            exit 1
          fi

          echo "Pinning Coolify app to commit ${GIT_SHA}"
          curl -fsSL -X PATCH \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"git_commit_sha\":\"${GIT_SHA}\",\"health_check_host\":\"127.0.0.1\",\"health_check_path\":\"/api/health/live\",\"health_check_start_period\":45,\"health_check_interval\":30}" \
            "${COOLIFY_URL%/}/api/v1/applications/${COOLIFY_APP_UUID}"

          echo "Triggering Coolify deploy (lgportfolio app only — never inferencia/ollama)"
          # COOLIFY_APP_UUID must be the lgportfolio application in Coolify UI, not inferencia.
          deploy_response="$(curl -fsSL -X GET \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Accept: application/json" \
            "${COOLIFY_URL%/}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false")"
          echo "${deploy_response}"